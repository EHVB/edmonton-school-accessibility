<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edmonton School Accessibility</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;height:100vh}
#map{position:absolute;top:0;bottom:0;left:0;right:0;z-index:1}

/* ---- Side Panel ---- */
#panel{position:absolute;top:0;left:0;bottom:0;width:340px;z-index:1000;
  background:#fff;border-right:1px solid #ccc;display:flex;flex-direction:column;
  box-shadow:2px 0 12px rgba(0,0,0,.12);transition:transform .3s}
#panel.collapsed{transform:translateX(-340px)}
#panel-toggle{position:absolute;top:12px;left:348px;z-index:1001;
  background:#1a5276;color:#fff;border:none;border-radius:0 6px 6px 0;
  padding:8px 10px;cursor:pointer;font-size:18px;box-shadow:2px 2px 6px rgba(0,0,0,.2);transition:left .3s}
#panel.collapsed+#panel-toggle{left:8px;border-radius:6px}

#panel-header{padding:14px 16px;background:#1a5276;color:#fff;flex-shrink:0}
#panel-header h1{font-size:15px;font-weight:700;line-height:1.3}
#panel-header p{font-size:11px;opacity:.8;margin-top:2px}

#panel-body{flex:1;overflow-y:auto;padding:0}

/* Layer groups */
.layer-group{border-bottom:1px solid #eee}
.layer-group-header{display:flex;align-items:center;padding:10px 14px;cursor:pointer;
  background:#f7f9fb;font-size:13px;font-weight:600;color:#333;user-select:none}
.layer-group-header:hover{background:#eaf2f8}
.layer-group-header .arrow{margin-right:8px;transition:transform .2s;font-size:10px}
.layer-group-header .arrow.open{transform:rotate(90deg)}
.layer-group-body{display:none;padding:4px 14px 8px 30px}
.layer-group-body.open{display:block}

.layer-item{display:flex;align-items:center;padding:3px 0;font-size:12px;color:#444;cursor:pointer}
.layer-item:hover{color:#1a5276}
.layer-item input{margin-right:8px;cursor:pointer}
.layer-item .swatch{width:14px;height:14px;border-radius:3px;margin-right:6px;border:1px solid #ccc;flex-shrink:0}
.layer-item .swatch.line{height:3px;border-radius:1px}
.layer-item .swatch.circle{border-radius:50%}
.layer-item .swatch.dashed{height:3px;border-radius:1px;border:none;
  background:repeating-linear-gradient(90deg,var(--c) 0,var(--c) 4px,transparent 4px,transparent 7px)}

/* ---- School Comparison Panel ---- */
#compare-section{border-top:2px solid #1a5276;padding:12px 14px;flex-shrink:0;background:#f0f6fa}
#compare-section h3{font-size:13px;font-weight:700;color:#1a5276;margin-bottom:6px}
#compare-section select{width:100%;padding:5px;font-size:12px;margin-bottom:4px;border:1px solid #ccc;border-radius:4px}
#compare-section label{font-size:11px;color:#555}
#compare-info{font-size:11px;color:#666;margin-top:6px;min-height:40px}

/* ---- Dynamic Legend ---- */
#legend{position:absolute;bottom:20px;right:20px;z-index:1000;
  background:rgba(255,255,255,.95);border:1px solid #ccc;border-radius:6px;
  padding:10px 14px;font-size:12px;max-height:60vh;overflow-y:auto;
  box-shadow:0 2px 8px rgba(0,0,0,.15);min-width:160px}
#legend h4{margin:0 0 6px;font-size:13px;color:#333;border-bottom:1px solid #eee;padding-bottom:4px}
#legend .leg-item{display:flex;align-items:center;padding:2px 0}
#legend .leg-swatch{width:16px;height:12px;margin-right:6px;border-radius:2px;border:1px solid #ccc;flex-shrink:0}
#legend .leg-swatch.line{height:3px}
#legend .leg-swatch.circle{width:10px;height:10px;border-radius:50%}
#legend .leg-swatch.dashed{height:3px;border:none;
  background:repeating-linear-gradient(90deg,var(--c) 0,var(--c) 4px,transparent 4px,transparent 7px)}
#legend .leg-label{font-size:11px;color:#444}
#legend:empty{display:none}

/* Loading overlay */
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;
  background:rgba(255,255,255,.9);padding:20px 30px;border-radius:8px;text-align:center;
  box-shadow:0 2px 12px rgba(0,0,0,.2);font-size:14px;color:#333}
#loading.hidden{display:none}
.spinner{width:30px;height:30px;border:3px solid #eee;border-top:3px solid #1a5276;
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="map"></div>

<!-- Loading -->
<div id="loading"><div class="spinner"></div>Loading data...</div>

<!-- Side Panel -->
<div id="panel">
  <div id="panel-header">
    <h1>Edmonton School Accessibility Analysis</h1>
    <p>Toggle layers to explore sidewalk &amp; bike lane network coverage</p>
  </div>
  <div id="panel-body"></div>
  <div id="compare-section">
    <h3>School Comparison</h3>
    <select id="school-select"><option value="">-- Select a school --</option></select>
    <select id="compare-mode">
      <option value="walk">Walk</option>
      <option value="bike">Bike</option>
    </select>
    <select id="compare-thresh"></select>
    <label><input type="checkbox" id="compare-sa" checked> Network Service Area</label><br>
    <label><input type="checkbox" id="compare-euc" checked> Euclidean Buffer</label>
    <div id="compare-info"></div>
  </div>
</div>
<button id="panel-toggle" onclick="togglePanel()">&#9776;</button>

<!-- Dynamic Legend -->
<div id="legend"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
var WALK_THRESHOLDS = [400, 800, 1200, 1600];
var BIKE_THRESHOLDS = [800, 1600, 2400, 3200];

var WALK_SA_COLORS = {400:'#08306b',800:'#1d6aa5',1200:'#3a8ec4',1600:'#5ba3d9'};
var BIKE_SA_COLORS = {800:'#084081',1600:'#1b7837',2400:'#41ab5d',3200:'#74c476'};
var WALK_EUC_COLORS = {400:'#67000d',800:'#a50f15',1200:'#d32f2f',1600:'#ef5350'};
var BIKE_EUC_COLORS = {800:'#67000d',1600:'#a50f15',2400:'#d32f2f',3200:'#ef5350'};
var SIDEWALK_COLOR = '#2ecc71';
var BIKE_ROUTE_COLOR = '#2266ff';

// ============================================================
// MAP INIT
// ============================================================
var map = L.map('map',{zoomControl:false}).setView([53.546,-113.494],11);
L.control.zoom({position:'topright'}).addTo(map);

// Basemap layers
var basemapLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png',{
  attribution:'(C) OpenStreetMap contributors (C) CARTO',maxZoom:19});
var basemapDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',{
  attribution:'(C) OpenStreetMap contributors (C) CARTO',maxZoom:19});
basemapLight.addTo(map);
var currentBasemap = 'light';

function switchBasemap(mode) {
  if (mode === currentBasemap) return;
  if (mode === 'dark') { map.removeLayer(basemapLight); basemapDark.addTo(map); basemapDark.bringToBack(); }
  else { map.removeLayer(basemapDark); basemapLight.addTo(map); basemapLight.bringToBack(); }
  currentBasemap = mode;
}

// ============================================================
// LAYER REGISTRY — tracks all layers, visibility, legend entries
// ============================================================
var LAYERS = {};  // id -> {layer, visible, legendItems:[], group}
var layerOrder = [];

function registerLayer(id, group, legendItems) {
  LAYERS[id] = {layer:null, visible:false, legendItems:legendItems||[], group:group, loading:false, loaded:false};
  layerOrder.push(id);
}

function showLayer(id) {
  var entry = LAYERS[id];
  if (!entry) return;
  entry.visible = true;
  if (entry.layer) { map.addLayer(entry.layer); }
  updateLegend();
}

function hideLayer(id) {
  var entry = LAYERS[id];
  if (!entry) return;
  entry.visible = false;
  if (entry.layer) { map.removeLayer(entry.layer); }
  updateLegend();
}

function toggleLayer(id, cb) {
  var entry = LAYERS[id];
  if (!entry) return;
  if (cb.checked) {
    if (!entry.loaded && !entry.loading) {
      entry.loading = true;
      loadLayerData(id, function() {
        entry.loaded = true;
        entry.loading = false;
        showLayer(id);
      });
    } else {
      showLayer(id);
    }
  } else {
    hideLayer(id);
  }
}

// ============================================================
// DYNAMIC LEGEND
// ============================================================
function updateLegend() {
  var el = document.getElementById('legend');
  var html = '<h4>Legend</h4>';
  var hasItems = false;
  layerOrder.forEach(function(id) {
    var e = LAYERS[id];
    if (!e.visible || !e.legendItems.length) return;
    e.legendItems.forEach(function(item) {
      hasItems = true;
      var cls = 'leg-swatch';
      var style = 'background:'+item.color+';';
      if (item.type === 'line') { cls += ' line'; }
      else if (item.type === 'circle') { cls += ' circle'; }
      else if (item.type === 'dashed') { cls += ' dashed'; style = '--c:'+item.color+';'; }
      html += '<div class="leg-item"><div class="'+cls+'" style="'+style+'"></div><span class="leg-label">'+item.label+'</span></div>';
    });
  });
  // Also add compare layers
  if (compareSALayer) {
    html += '<div class="leg-item"><div class="leg-swatch" style="background:#2171b5;opacity:.6"></div><span class="leg-label">School Service Area</span></div>';
    hasItems = true;
  }
  if (compareEucLayer) {
    html += '<div class="leg-item"><div class="leg-swatch dashed" style="--c:#e74c3c"></div><span class="leg-label">School Euclidean Buffer</span></div>';
    hasItems = true;
  }
  el.innerHTML = hasItems ? html : '';
}

// ============================================================
// DATA LOADING
// ============================================================
var dataCache = {};

function fetchJSON(url, cb) {
  if (dataCache[url]) { cb(dataCache[url]); return; }
  fetch(url).then(function(r){return r.json()}).then(function(data){
    dataCache[url] = data;
    cb(data);
  }).catch(function(err){ console.error('Failed to load '+url, err); });
}

function coverageColor(pct) {
  if (pct >= 75) return '#2ecc71';
  if (pct >= 50) return '#f1c40f';
  if (pct >= 25) return '#e67e22';
  return '#e74c3c';
}

function loadLayerData(id, cb) {
  var parts = id.split('_');

  // City boundary
  if (id === 'city_boundary') {
    fetchJSON('data/city_boundary.geojson', function(data){
      LAYERS[id].layer = L.geoJSON(data, {style:{color:'#1a5276',weight:2.5,fillColor:'#d4e6f1',fillOpacity:.15}});
      cb();
    }); return;
  }

  // Neighbourhoods
  if (id === 'neighbourhoods') {
    fetchJSON('data/neighbourhoods.geojson', function(data){
      LAYERS[id].layer = L.geoJSON(data, {
        style:{color:'#666',weight:.5,fillOpacity:0},
        onEachFeature:function(f,layer){
          var p=f.properties; var name=p.nbhd_name||'';
          var html='<b>'+name+'</b><br>Area: '+(p.area_sqkm||0)+' km&sup2;<br>Schools: '+(p.num_schools||0);
          if(p.walk_net_1600m_pct!==undefined) html+='<br>Walk 1600m: '+p.walk_net_1600m_pct+'%';
          if(p.bike_net_3200m_pct!==undefined) html+='<br>Bike 3200m: '+p.bike_net_3200m_pct+'%';
          layer.bindPopup(html); layer.bindTooltip(name);
        }
      });
      cb();
    }); return;
  }

  // Neighbourhood coverage choropleths
  if (id.startsWith('nbhd_cov_')) {
    var metric = id.replace('nbhd_cov_','');
    fetchJSON('data/neighbourhoods.geojson', function(data){
      LAYERS[id].layer = L.geoJSON(data, {
        style:function(f){ var v=f.properties[metric]||0; return {color:'#333',weight:.5,fillColor:coverageColor(v),fillOpacity:.55}; },
        onEachFeature:function(f,layer){
          var p=f.properties; var v=(p[metric]||0);
          layer.bindPopup('<b>'+p.nbhd_name+'</b><br>'+metric+': '+v+'%<br>Gap: '+(100-v).toFixed(1)+'%');
          layer.bindTooltip(p.nbhd_name+': '+v+'%');
        }
      });
      cb();
    }); return;
  }

  // Catchments
  if (id === 'catchments') {
    fetchJSON('data/catchments.geojson', function(data){
      LAYERS[id].layer = L.geoJSON(data, {
        style:{color:'#000',weight:1,fillOpacity:.03},
        onEachFeature:function(f,layer){
          var p=f.properties; var name=p.catchment_name||'';
          var html='<div style="min-width:280px"><b>'+name+'</b><br>Area: '+(p.catchment_area_sqkm||0)+' km&sup2;<br>Schools: '+(p.num_schools||0);
          html+='<hr><b>Walk Coverage</b><br>';
          [400,800,1200,1600].forEach(function(t){var v=p['walk_net_'+t+'m_pct']||0;html+=t+'m: <b style="color:'+coverageColor(v)+'">'+v+'%</b> (gap: '+(100-v).toFixed(1)+'%)<br>';});
          html+='<hr><b>Bike Coverage</b><br>';
          [800,1600,2400,3200].forEach(function(t){var v=p['bike_net_'+t+'m_pct']||0;html+=t+'m: <b style="color:'+coverageColor(v)+'">'+v+'%</b> (gap: '+(100-v).toFixed(1)+'%)<br>';});
          html+='</div>';
          layer.bindPopup(html,{maxWidth:320}); layer.bindTooltip(name);
        }
      });
      cb();
    }); return;
  }

  // Catchment coverage choropleths
  if (id.startsWith('catch_cov_')) {
    var metric = id.replace('catch_cov_','');
    fetchJSON('data/catchments.geojson', function(data){
      LAYERS[id].layer = L.geoJSON(data, {
        style:function(f){ var v=f.properties[metric]||0; return {color:'#333',weight:1,fillColor:coverageColor(v),fillOpacity:.55}; },
        onEachFeature:function(f,layer){
          var p=f.properties; var v=(p[metric]||0);
          layer.bindPopup('<b>'+p.catchment_name+'</b><br>'+metric+': '+v+'%<br>Gap: '+(100-v).toFixed(1)+'%');
          layer.bindTooltip((p.catchment_name||'')+': '+v+'%');
        }
      });
      cb();
    }); return;
  }

  // Sidewalks
  if (id === 'sidewalks') {
    fetchJSON('data/sidewalks.geojson', function(data){
      LAYERS[id].layer = L.geoJSON(data, {style:{color:SIDEWALK_COLOR,weight:1.4,opacity:.6},interactive:false});
      cb();
    }); return;
  }

  // Bike routes
  if (id === 'bike_routes') {
    fetchJSON('data/bike_routes.geojson', function(data){
      LAYERS[id].layer = L.geoJSON(data, {
        style:function(f){return {color:BIKE_ROUTE_COLOR,weight:2.5,opacity:.75}},
        onEachFeature:function(f,layer){layer.bindTooltip(f.properties.classification||'');}
      });
      cb();
    }); return;
  }

  // Schools
  if (id === 'schools_epsb' || id === 'schools_catholic') {
    var board = id === 'schools_epsb' ? 'EPSB' : 'catholic';
    fetchJSON('data/schools.geojson', function(data){
      var color = board === 'EPSB' ? '#ff2222' : '#2266ff';
      var group = L.layerGroup();
      data.features.forEach(function(f){
        if (board === 'EPSB' && f.properties.board !== 'EPSB') return;
        if (board !== 'EPSB' && f.properties.board === 'EPSB') return;
        var c = f.geometry.coordinates;
        var p = f.properties;
        var wc = p.walk_connected ? '<span style="color:green">Yes</span>' : '<span style="color:red">No</span>';
        var bc = p.bike_connected ? '<span style="color:green">Yes</span>' : '<span style="color:red">No</span>';
        var popup = '<b>'+p.school_name+'</b><br>Board: '+p.board+
          '<br>Walk connected: '+wc+' ('+Math.round(p.walk_snap_dist||0)+'m)'+
          '<br>Bike connected: '+bc+' ('+Math.round(p.bike_snap_dist||0)+'m)';
        L.circleMarker([c[1],c[0]],{radius:5,color:'#333',weight:1.5,fillColor:color,fillOpacity:.85})
          .bindPopup(popup).bindTooltip(p.school_name).addTo(group);
      });
      LAYERS[id].layer = group;
      cb();
    }); return;
  }

  // Disconnected schools
  if (id === 'disc_walk' || id === 'disc_bike') {
    var network = id === 'disc_walk' ? 'walk' : 'bike';
    var connField = network+'_connected';
    fetchJSON('data/schools.geojson', function(data){
      var group = L.layerGroup();
      var markerColor = network==='walk' ? '#ff0000' : '#ff8800';
      data.features.forEach(function(f){
        if (f.properties[connField]) return;
        var c = f.geometry.coordinates;
        L.circleMarker([c[1],c[0]],{radius:9,color:markerColor,weight:2.5,fillColor:'#ffff00',fillOpacity:.9})
          .bindPopup('<b>'+f.properties.school_name+'</b><br>Board: '+f.properties.board+
            '<br>'+network+' snap: '+Math.round(f.properties[network+'_snap_dist']||0)+'m<br><b>DISCONNECTED</b>')
          .bindTooltip('DISCONNECTED: '+f.properties.school_name)
          .addTo(group);
      });
      LAYERS[id].layer = group;
      cb();
    }); return;
  }

  // Walk/Bike dissolved service areas
  if (id.match(/^(walk|bike)_sa_\d+$/)) {
    var mode = id.startsWith('walk') ? 'walk' : 'bike';
    var thresh = parseInt(id.split('_')[2]);
    var colors = mode==='walk' ? WALK_SA_COLORS : BIKE_SA_COLORS;
    fetchJSON('data/'+mode+'_sa_dissolved.geojson', function(data){
      var filtered = {type:'FeatureCollection',features:data.features.filter(function(f){return f.properties.threshold===thresh})};
      LAYERS[id].layer = L.geoJSON(filtered, {style:{color:colors[thresh],weight:1,fillColor:colors[thresh],fillOpacity:.45}});
      cb();
    }); return;
  }

  // Walk/Bike dissolved Euclidean
  if (id.match(/^(walk|bike)_euc_\d+$/)) {
    var mode = id.startsWith('walk') ? 'walk' : 'bike';
    var thresh = parseInt(id.split('_')[2]);
    var colors = mode==='walk' ? WALK_EUC_COLORS : BIKE_EUC_COLORS;
    fetchJSON('data/'+mode+'_euc_dissolved.geojson', function(data){
      var filtered = {type:'FeatureCollection',features:data.features.filter(function(f){return f.properties.threshold===thresh})};
      LAYERS[id].layer = L.geoJSON(filtered, {style:{color:colors[thresh],weight:2,fillOpacity:0,dashArray:'6 4'}});
      cb();
    }); return;
  }

  cb();
}

// ============================================================
// REGISTER ALL LAYERS
// ============================================================

// Boundaries
registerLayer('city_boundary','Boundaries',[{color:'#1a5276',type:'rect',label:'City of Edmonton'}]);
registerLayer('neighbourhoods','Boundaries',[{color:'#666',type:'line',label:'Neighbourhood Boundaries'}]);
registerLayer('catchments','Boundaries',[{color:'#000',type:'line',label:'Catchment Boundaries'}]);

// Coverage choropleths — all thresholds
var covLegend = [
  {color:'#2ecc71',type:'rect',label:'>=75%'},{color:'#f1c40f',type:'rect',label:'50-75%'},
  {color:'#e67e22',type:'rect',label:'25-50%'},{color:'#e74c3c',type:'rect',label:'<25%'}];

WALK_THRESHOLDS.forEach(function(t){
  registerLayer('catch_cov_walk_net_'+t+'m_pct','Catchment Coverage (Walk)', covLegend);
});
BIKE_THRESHOLDS.forEach(function(t){
  registerLayer('catch_cov_bike_net_'+t+'m_pct','Catchment Coverage (Bike)', covLegend);
});
WALK_THRESHOLDS.forEach(function(t){
  registerLayer('nbhd_cov_walk_net_'+t+'m_pct','Neighbourhood Coverage (Walk)', covLegend);
});
BIKE_THRESHOLDS.forEach(function(t){
  registerLayer('nbhd_cov_bike_net_'+t+'m_pct','Neighbourhood Coverage (Bike)', covLegend);
});

// Infrastructure
registerLayer('sidewalks','Infrastructure',[{color:SIDEWALK_COLOR,type:'line',label:'Sidewalks'}]);
registerLayer('bike_routes','Infrastructure',[{color:BIKE_ROUTE_COLOR,type:'line',label:'Bike Routes'}]);

// Schools
registerLayer('schools_epsb','Schools',[{color:'#ff2222',type:'circle',label:'EPSB School'}]);
registerLayer('schools_catholic','Schools',[{color:'#2266ff',type:'circle',label:'Catholic School'}]);
registerLayer('disc_walk','Schools',[{color:'#ffff00',type:'circle',label:'Walk Disconnected'}]);
registerLayer('disc_bike','Schools',[{color:'#ffff00',type:'circle',label:'Bike Disconnected'}]);

// Walk service areas
WALK_THRESHOLDS.forEach(function(t){
  registerLayer('walk_sa_'+t,'Walk Service Areas',[{color:WALK_SA_COLORS[t],type:'rect',label:t+'m Network'}]);
});
// Walk Euclidean
WALK_THRESHOLDS.forEach(function(t){
  registerLayer('walk_euc_'+t,'Walk Euclidean Buffers',[{color:WALK_EUC_COLORS[t],type:'dashed',label:t+'m Euclidean'}]);
});
// Bike service areas
BIKE_THRESHOLDS.forEach(function(t){
  registerLayer('bike_sa_'+t,'Bike Service Areas',[{color:BIKE_SA_COLORS[t],type:'rect',label:t+'m Network'}]);
});
// Bike Euclidean
BIKE_THRESHOLDS.forEach(function(t){
  registerLayer('bike_euc_'+t,'Bike Euclidean Buffers',[{color:BIKE_EUC_COLORS[t],type:'dashed',label:t+'m Euclidean'}]);
});

// ============================================================
// BUILD SIDE PANEL UI
// ============================================================
(function(){
  var body = document.getElementById('panel-body');

  // Basemap radio selector at top
  var bmDiv = document.createElement('div');
  bmDiv.style.cssText = 'padding:10px 14px;border-bottom:1px solid #eee;background:#f0f4f8';
  bmDiv.innerHTML = '<div style="font-size:13px;font-weight:600;color:#333;margin-bottom:4px">Basemap</div>'+
    '<label style="font-size:12px;cursor:pointer;margin-right:12px"><input type="radio" name="basemap" value="light" checked style="margin-right:4px">Light</label>'+
    '<label style="font-size:12px;cursor:pointer"><input type="radio" name="basemap" value="dark" style="margin-right:4px">Dark</label>';
  bmDiv.querySelectorAll('input').forEach(function(r){
    r.onchange = function(){ switchBasemap(this.value); };
  });
  body.appendChild(bmDiv);

  var groups = {};
  layerOrder.forEach(function(id){
    var g = LAYERS[id].group;
    if (!groups[g]) groups[g] = [];
    groups[g].push(id);
  });

  var groupNames = [];
  layerOrder.forEach(function(id){ var g=LAYERS[id].group; if(groupNames.indexOf(g)===-1) groupNames.push(g); });

  var labelMap = {
    'city_boundary':'City of Edmonton Boundary',
    'neighbourhoods':'Neighbourhood Boundaries',
    'catchments':'Catchment Boundaries',
    'sidewalks':'Sidewalk Network',
    'bike_routes':'Bike Lane Network',
    'schools_epsb':'EPSB Schools',
    'schools_catholic':'Catholic Schools',
    'disc_walk':'Walk Disconnected',
    'disc_bike':'Bike Disconnected'
  };
  WALK_THRESHOLDS.forEach(function(t){
    labelMap['catch_cov_walk_net_'+t+'m_pct'] = 'Walk '+t+'m';
    labelMap['nbhd_cov_walk_net_'+t+'m_pct'] = 'Walk '+t+'m';
    labelMap['walk_sa_'+t]=t+'m Network SA';
    labelMap['walk_euc_'+t]=t+'m Euclidean Buffer';
  });
  BIKE_THRESHOLDS.forEach(function(t){
    labelMap['catch_cov_bike_net_'+t+'m_pct'] = 'Bike '+t+'m';
    labelMap['nbhd_cov_bike_net_'+t+'m_pct'] = 'Bike '+t+'m';
    labelMap['bike_sa_'+t]=t+'m Network SA';
    labelMap['bike_euc_'+t]=t+'m Euclidean Buffer';
  });

  function swatchHTML(id) {
    var e = LAYERS[id];
    if (!e.legendItems.length) return '';
    var item = e.legendItems[0];
    var cls = 'swatch';
    var style = 'background:'+item.color+';';
    if (item.type==='line') cls += ' line';
    else if (item.type==='circle') cls += ' circle';
    else if (item.type==='dashed') { cls += ' dashed'; style = '--c:'+item.color+';'; }
    return '<span class="'+cls+'" style="'+style+'"></span>';
  }

  groupNames.forEach(function(gname){
    var ids = groups[gname];
    var div = document.createElement('div');
    div.className = 'layer-group';

    var header = document.createElement('div');
    header.className = 'layer-group-header';
    header.innerHTML = '<span class="arrow">&#9654;</span>' + gname;

    var bodyDiv = document.createElement('div');
    bodyDiv.className = 'layer-group-body';

    header.onclick = function(){
      var arrow = header.querySelector('.arrow');
      arrow.classList.toggle('open');
      bodyDiv.classList.toggle('open');
    };

    ids.forEach(function(id){
      var label = labelMap[id] || id;
      var item = document.createElement('label');
      item.className = 'layer-item';
      item.innerHTML = '<input type="checkbox" data-layer="'+id+'">' + swatchHTML(id) + label;
      item.querySelector('input').onchange = function(){ toggleLayer(id, this); };
      bodyDiv.appendChild(item);
    });

    div.appendChild(header);
    div.appendChild(bodyDiv);
    body.appendChild(div);
  });
})();

// ============================================================
// SCHOOL COMPARISON
// ============================================================
var compareSALayer = null, compareEucLayer = null, compareMarker = null;
var perSchoolData = {walk_sa:null, bike_sa:null, walk_euc:null, bike_euc:null};

function loadPerSchoolData(key, cb) {
  if (perSchoolData[key]) { cb(); return; }
  var files = {walk_sa:'walk_sa_per_school',bike_sa:'bike_sa_per_school',
               walk_euc:'walk_euc_per_school',bike_euc:'bike_euc_per_school'};
  fetchJSON('data/'+files[key]+'.geojson', function(data){
    perSchoolData[key] = data;
    cb();
  });
}

// Populate school dropdown
fetchJSON('data/schools.geojson', function(data){
  var sel = document.getElementById('school-select');
  var names = data.features.map(function(f){return f.properties.school_name}).sort();
  names.forEach(function(n){
    var opt = document.createElement('option');
    opt.value = n; opt.text = n;
    sel.appendChild(opt);
  });
  document.getElementById('loading').classList.add('hidden');
});

function updateCompareThresholds() {
  var mode = document.getElementById('compare-mode').value;
  var sel = document.getElementById('compare-thresh');
  var thresholds = mode === 'walk' ? WALK_THRESHOLDS : BIKE_THRESHOLDS;
  sel.innerHTML = '';
  thresholds.forEach(function(t){
    var opt = document.createElement('option'); opt.value=t; opt.text=t+'m';
    sel.appendChild(opt);
  });
  sel.value = thresholds[thresholds.length-1];
}
updateCompareThresholds();

function clearCompare() {
  if (compareSALayer) { map.removeLayer(compareSALayer); compareSALayer=null; }
  if (compareEucLayer) { map.removeLayer(compareEucLayer); compareEucLayer=null; }
  if (compareMarker) { map.removeLayer(compareMarker); compareMarker=null; }
  updateLegend();
}

function updateCompare() {
  clearCompare();
  var school = document.getElementById('school-select').value;
  if (!school) { document.getElementById('compare-info').innerHTML=''; return; }

  var mode = document.getElementById('compare-mode').value;
  var thresh = parseInt(document.getElementById('compare-thresh').value);
  var showSA = document.getElementById('compare-sa').checked;
  var showEuc = document.getElementById('compare-euc').checked;

  var saKey = mode+'_sa', eucKey = mode+'_euc';
  var loaded = 0, needed = 0;
  if (showSA) needed++;
  if (showEuc) needed++;
  if (needed===0) { updateLegend(); return; }

  function tryRender() {
    loaded++;
    if (loaded < needed) return;

    // Find school location
    var schoolData = dataCache['data/schools.geojson'];
    var schoolFeature = schoolData.features.find(function(f){return f.properties.school_name===school});
    if (schoolFeature) {
      var c = schoolFeature.geometry.coordinates;
      var p = schoolFeature.properties;
      compareMarker = L.circleMarker([c[1],c[0]],{radius:8,color:'#000',weight:3,fillColor:p.board==='EPSB'?'#ff2222':'#2266ff',fillOpacity:1,zIndex:1000}).addTo(map);

      var connKey = mode+'_connected';
      document.getElementById('compare-info').innerHTML =
        '<b>'+school+'</b> ('+p.board+')<br>'+
        mode+' connected: '+(p[connKey]?'<span style="color:green">Yes</span>':'<span style="color:red">No</span>')+
        '<br>Snap dist: '+Math.round(p[mode+'_snap_dist']||0)+'m';
    }

    var bounds = L.latLngBounds();
    if (compareMarker) bounds.extend(compareMarker.getLatLng());

    if (showSA && perSchoolData[saKey]) {
      var feat = perSchoolData[saKey].features.filter(function(f){
        return f.properties.school_name===school && f.properties.threshold===thresh;
      });
      if (feat.length) {
        compareSALayer = L.geoJSON({type:'FeatureCollection',features:feat},{
          style:{color:'#2171b5',weight:2,fillColor:'#2171b5',fillOpacity:.45}
        }).addTo(map);
        bounds.extend(compareSALayer.getBounds());
      }
    }

    if (showEuc && perSchoolData[eucKey]) {
      var feat = perSchoolData[eucKey].features.filter(function(f){
        return f.properties.school_name===school && f.properties.threshold===thresh;
      });
      if (feat.length) {
        compareEucLayer = L.geoJSON({type:'FeatureCollection',features:feat},{
          style:{color:'#e74c3c',weight:2,fillColor:'#e74c3c',fillOpacity:.12,dashArray:'8 4'}
        }).addTo(map);
        bounds.extend(compareEucLayer.getBounds());
      }
    }

    if (bounds.isValid()) map.fitBounds(bounds.pad(.2));
    updateLegend();
  }

  if (showSA) loadPerSchoolData(saKey, tryRender);
  if (showEuc) loadPerSchoolData(eucKey, tryRender);
}

document.getElementById('school-select').onchange = updateCompare;
document.getElementById('compare-mode').onchange = function(){ updateCompareThresholds(); updateCompare(); };
document.getElementById('compare-thresh').onchange = updateCompare;
document.getElementById('compare-sa').onchange = updateCompare;
document.getElementById('compare-euc').onchange = updateCompare;

// Also let clicking a school marker on the map select it in the dropdown
map.on('popupopen', function(e) {
  var content = e.popup.getContent();
  var match = content.match(/<b>([^<]+)<\/b>/);
  if (match) {
    var sel = document.getElementById('school-select');
    for (var i=0; i<sel.options.length; i++) {
      if (sel.options[i].value === match[1]) { sel.value = match[1]; break; }
    }
  }
});

// ============================================================
// PANEL TOGGLE
// ============================================================
function togglePanel() {
  document.getElementById('panel').classList.toggle('collapsed');
  var btn = document.getElementById('panel-toggle');
  btn.style.left = document.getElementById('panel').classList.contains('collapsed') ? '8px' : '348px';
  setTimeout(function(){ map.invalidateSize(); }, 350);
}
</script>
